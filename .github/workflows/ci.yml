name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: "file:./packages/db/prisma/dev.db"

      - name: Setup database
        run: pnpm --filter @ai-analyzer/db exec prisma db push
        env:
          DATABASE_URL: "file:./packages/db/prisma/dev.db"

      - name: Test
        run: pnpm test --passWithNoTests || true
        env:
          DATABASE_URL: "file:./packages/db/prisma/dev.db"
          REDIS_HOST: localhost
          REDIS_PORT: 6379